name: CI Build and Test

on:
  push:
    [cite_start]branches: [ main ] 
  pull_request:
    branches: [ main ]

jobs:
  build-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      - name: Install Dependencies
        run: cd backend && npm install
      - name: Build Backend Docker Image
        run: docker build ./backend -t chat-backend:latest

  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Build Frontend Docker Image
        run: docker build ./frontend -t chat-frontend:latest